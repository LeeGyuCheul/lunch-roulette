<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>점심 룰렛</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="header">
        <div>
          <p class="eyebrow">Lunch Roulette</p>
          <h1>오늘 점심 정하기</h1>
        </div>
        <button class="ghost-button" id="resetButton" type="button">초기화</button>
      </section>

      <section class="layout">
        <section class="panel input-panel" aria-labelledby="memberTitle">
          <div class="section-title">
            <h2 id="memberTitle">관리</h2>
            <span id="memberCount">0명</span>
          </div>

          <div class="lock-status" id="lockStatus">조작 가능</div>

          <section class="user-panel" aria-label="사용자 설정">
            <label>
              내 이름
              <select id="userNameSelect">
                <option value="">선택하세요</option>
              </select>
            </label>
            <div class="admin-status" id="adminStatus">관리자 권한 없음</div>
            <button class="admin-enroll-button" id="adminEnrollButton" type="button">이 브라우저를 관리자 기기로 등록</button>
          </section>

          <section class="rule-box" aria-label="룰렛 규칙">
            <strong>규칙</strong>
            <p>벤픽 당첨자는 음식 후보를 최대 3개까지 등록할 수 있습니다.</p>
            <p>오늘 선택된 음식은 다음날 자동 제외되고, 이틀 후 다시 후보에 들어옵니다.</p>
          </section>

          <form id="memberForm" class="member-form">
            <label>
              멤버 이름
              <input id="nameInput" type="text" placeholder="예: 민수" autocomplete="off" required />
            </label>
            <button class="primary-button" type="submit">멤버 추가</button>
          </form>

          <form id="foodForm" class="member-form food-form">
            <label>
              소울푸드
              <input id="foodInput" type="text" placeholder="예: 국밥, 돈까스, 쌀국수" autocomplete="off" />
            </label>
            <button class="secondary-button" type="submit">음식 후보 추가</button>
          </form>

          <section class="food-admin-zone" aria-labelledby="foodAdminTitle">
            <div class="list-title">
              <h3 id="foodAdminTitle">음식 관리</h3>
              <span id="foodAdminCount">0개</span>
            </div>
            <div class="admin-food-list" id="foodAdminList"></div>
          </section>

          <section class="drop-zone excluded-food-zone" data-type="food" data-excluded="true" aria-labelledby="foodListTitle">
            <div class="list-title">
              <h3 id="foodListTitle">제외 음식</h3>
              <span id="foodCount">0개</span>
            </div>
            <div class="members" id="excludedFoods"></div>
          </section>

          <section class="drop-zone excluded-zone" data-type="member" data-excluded="true" aria-labelledby="excludedTitle">
            <div class="list-title">
              <h3 id="excludedTitle">제외 멤버</h3>
              <span id="excludedCount">0명</span>
            </div>
            <div class="members" id="excludedMembers"></div>
          </section>
        </section>

        <section class="panel roulette-panel" aria-labelledby="rouletteTitle">
          <div class="section-title">
            <h2 id="rouletteTitle">룰렛</h2>
            <span id="candidateCount">후보 0개</span>
          </div>

          <div class="mode-tabs" role="tablist" aria-label="룰렛 선택">
            <button class="mode-tab is-active" id="vanModeButton" type="button" data-mode="van">벤 담당</button>
            <button class="mode-tab" id="foodModeButton" type="button" data-mode="food">음식</button>
          </div>

          <div class="wheel-wrap drop-zone wheel-drop-zone" data-excluded="false" aria-label="룰렛">
            <div class="pointer"></div>
            <canvas id="wheel" width="420" height="420" aria-label="룰렛"></canvas>
            <div class="wheel-drag-layer" id="wheelDragLayer"></div>
            <button class="wheel-center" id="spinButton" type="button" aria-label="선택한 룰렛 돌리기">GO</button>
            <div class="winner-pop" id="winnerPop" aria-live="polite" aria-hidden="true">
              <span id="winnerPopLabel">오늘의 선택</span>
              <strong id="winnerPopName"></strong>
            </div>
          </div>

          <section class="result-box" aria-live="polite">
            <p class="label">오늘의 결과</p>
            <h3 id="foodResult">아직 음식이 정해지지 않았습니다.</h3>
            <p id="vanResult">벤 담당자도 아직 정해지지 않았습니다.</p>
          </section>
        </section>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
